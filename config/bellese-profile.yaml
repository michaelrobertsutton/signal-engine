version: '1.0.0'
company: Bellese
primary_agency: CMS
domain:
  strong:
    - CMS digital modernization
    - beneficiary and provider-facing platforms
    - quality reporting
    - data workflows
    - FHIR and API modernization
    - workflow optimization
    - pragmatic AI with human-in-the-loop
  conditional:
    - large-scale enterprise operations (needs scale staffing proof)
    - Part C and Part D specialized domain (needs dedicated SME)
    - opportunities requiring prime-ready scale (heavy partner reliance)
  exclusions:
    - Rural Health transformation (federal level)
    - Agencies requiring CMMI Dev/Services Certs for priming (e.g., FDA Enterprise App BPA)
    - Hardware-only contracts
    - Purely legacy maintenance without modernization potential

capabilities:
  technical:
    - cloud platform modernization
    - API development and integration
    - data engineering and analytics
    - human-centered design
    - agile delivery
  proof_points:
    - contract: HQR (Hospital Quality Reporting)
      agency: CMS
      description: Modernization of digital platforms for national hospital quality data submission and digital quality measurement.
    - contract: QMARS (Quality Management and Review System)
      agency: CMS
      description: End-to-end case management and review platform supporting clinical quality oversight for BFCC-QIOs.
    - contract: UCM (Unified Case Management)
      agency: CMS
      description: Modern digital services and investigative case management for fraud, waste, and abuse detection.
    - contract: MADiE (Measure Authoring and Development Integrated Environment)
      agency: CMS
      description: Cloud-native toolset for authoring, testing, and developing quality measures in a FHIR-based ecosystem.
    - contract: MCP (Model Content Program)
      agency: CMS
      description: Quality measure data ingestion and calculation supporting CMMI model operations.

contract_preferences:
  size_range:
    floor: 10000000
    ceiling: 150000000
  preferred_types:
    - IDIQ task order
    - BPA call
    - firm fixed price
    - time and materials
  naics_whitelist:
    - 541511   # Custom Computer Programming Services
    - 541512   # Computer Systems Design Services
    - 541519   # Other Computer Related Services
    - 54151S   # SAM.gov IT services umbrella code
    - 541611   # Administrative Management Consulting
    - 518210   # Data Processing and Hosting
    - 541715   # R&D in Physical/Engineering Sciences (non-biotech)
    - 611420   # Computer Training

partner_needs:
  - scale staffing for large programs
  - Part C/D specialized SMEs
  - FedRAMP-authorized hosting (if not already held)

scoring_weights:
  strategic_fit: 0.35
  capability_fit: 0.35
  competitiveness: 0.30

module_a:
  solution_scope: bellese_relevant_with_ai_option

delivery:
  channels:
    - slack
    - monday.com
    - email